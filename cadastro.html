<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | NexaShare</title>
  <link rel="icon" type="image/x-icon" href="../fotos/favicon.ico">
  <link rel="stylesheet" href="style.css?v=5">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; }
    input, button, select, .form { font-family: inherit; }
  </style>
</head>
<body>

  <!-- Modo Escuro -->
  <div class="toggle-theme-login">
    <span>Modo Escuro</span>
    <label class="switch">
      <input type="checkbox" id="theme-toggle">
    </label>
  </div>

  <!-- Logo -->
  <div class="logotipo">
    <a href="../pagina_inicial.html">
      <img src="../fotos/nexalogo.png" alt="Logo">
    </a>
  </div>

  <!-- Formulário -->
  <div class="form">
    <img src="../fotos/nexalogo.png" alt="Logo" class="logotipo-pequeno">
    <form id="form-cadastro" action="#">
      <div class="form-header">
        <div class="title"><h1>Cadastro</h1></div>
      </div>

      <div class="input-group">

        <div class="input-box">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
        </div>

        <div class="input-box">
          <label for="usuario">Nome de usuário</label>
          <input type="text" id="usuario" name="usuario" placeholder="Escolha um usuário (ex: joaodasilva)" required>
        </div>

        <div class="gender-input">
          <div class="gender-title"><h3>Gênero</h3></div>
          <div class="gender-group">
            <label for="gender-select" class="sr-only">Gênero</label>
            <select id="gender-select" name="gender" required>
              <option value="">Selecione</option>
              <option value="female">Feminino</option>
              <option value="male">Masculino</option>
              <option value="others">Outros</option>
              <option value="none">Prefiro não dizer</option>
            </select>
          </div>
        </div>

        <div class="input-box">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
        </div>

        <div class="input-box">
          <label for="celular">Celular</label>
          <input type="tel" id="celular" name="celular" placeholder="(xx) xxxxx-xxxx" required>
        </div>

        <div class="input-box cpf-cep tight-pair">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF" required maxlength="11"
            inputmode="numeric" pattern="\d{11}" oninput="this.value=this.value.replace(/\D/g,'').slice(0,11)">
          <div class="erro" id="erro-cpf"></div>
        </div>

        <div class="input-box cpf-cep">
          <label for="cep">CEP</label>
          <input type="text" id="cep" name="cep" placeholder="Digite seu CEP" required maxlength="8"
            inputmode="numeric" pattern="\d{8}" oninput="this.value=this.value.replace(/\D/g,'').slice(0,8)">
          <div class="erro" id="erro-cep"></div>
        </div>

        <div class="input-box lift">
          <label for="endereco">Endereço (preenchido automaticamente)</label>
          <input type="text" id="endereco" name="endereco" placeholder="Rua, Bairro, Cidade - UF" readonly>
        </div>

        <div class="input-box">
          <label for="numero">Número</label>
          <input type="text" id="numero" name="numero" placeholder="Número" inputmode="numeric">
        </div>

        <div class="input-box">
          <label for="complemento">Complemento</label>
          <input type="text" id="complemento" name="complemento" placeholder="Apartamento, bloco... (opcional)">
        </div>

        <div class="input-box lift">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="Mín. 8 caracteres, 1 maiúscula e 1 especial" required minlength="8">
          <div class="erro" id="erro-senha"></div>
        </div>

        <div class="input-box lift">
          <label for="confirma-senha">Confirme sua senha</label>
          <input type="password" id="confirma-senha" name="confirma-senha" placeholder="Confirme sua senha" required>
          <div class="erro" id="erro-confirma"></div>
        </div>

      </div>

      <div class="continue-button lift">
        <button type="submit">Continuar</button>
      </div>
      <div class="have-account" style="text-align:center;margin-top:12px;">
        <p>Já tem conta? <a href="login.html">Faça login</a></p>
      </div>
      <div id="msg-sucesso" class="mensagem-sucesso" style="display:none;">Cadastro realizado! Redirecionando...</div>
    </form>
  </div>

  <script>
  (function () {

    // ── Tema ──
    var botaoTema = document.getElementById('theme-toggle');
    var isSwitch  = botaoTema && botaoTema.type === 'checkbox';
    var corpo     = document.body;

    if (localStorage.getItem('tema') === 'escuro') {
      corpo.classList.add('modo-escuro');
      if (isSwitch) botaoTema.checked = true;
    }

    if (botaoTema) {
      botaoTema.addEventListener(isSwitch ? 'change' : 'click', function () {
        if (isSwitch) corpo.classList.toggle('modo-escuro', botaoTema.checked);
        else corpo.classList.toggle('modo-escuro');
        localStorage.setItem('tema', corpo.classList.contains('modo-escuro') ? 'escuro' : 'claro');
      });
    }

    // ── Referências ──
    var formulario    = document.getElementById('form-cadastro');
    var msgSucesso    = document.getElementById('msg-sucesso');
    var inputCPF      = document.getElementById('cpf');
    var inputCEP      = document.getElementById('cep');
    var inputEndereco = document.getElementById('endereco');
    var erroCPF       = document.getElementById('erro-cpf');
    var erroCEP       = document.getElementById('erro-cep');
    var inputSenha    = document.getElementById('senha');
    var inputConfirma = document.getElementById('confirma-senha');
    var erroSenha     = document.getElementById('erro-senha');
    var erroConfirma  = document.getElementById('erro-confirma');

    // ── Validação de CPF ──
    function validarCPF(cpf) {
      cpf = (cpf || '').replace(/\D/g, '');
      if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) return false;
      var soma = 0, resto;
      for (var i = 0; i < 9; i++) soma += parseInt(cpf[i]) * (10 - i);
      resto = soma % 11;
      if (parseInt(cpf[9]) !== (resto < 2 ? 0 : 11 - resto)) return false;
      soma = 0;
      for (var j = 0; j < 10; j++) soma += parseInt(cpf[j]) * (11 - j);
      resto = soma % 11;
      return parseInt(cpf[10]) === (resto < 2 ? 0 : 11 - resto);
    }

    // ── Busca CEP ──
    function buscarCEP(cep) {
      var c = cep.replace(/\D/g, '');
      if (c.length !== 8) return Promise.reject(new Error('CEP inválido'));
      return fetch('https://viacep.com.br/ws/' + c + '/json/')
        .then(function (r) { return r.json(); })
        .then(function (d) { if (d.erro) throw new Error('não encontrado'); return d; });
    }

    // ── Validação de senha ──
    function validarSenha(s) {
      return s && s.length >= 8 && /[A-Z]/.test(s) && /[!@#$%^&*()\-_=+\[\]{};:'"|,.<>/?`~\\]/.test(s);
    }

    // ── Eventos de validação inline ──
    if (inputCPF) {
      inputCPF.addEventListener('blur', function () {
        erroCPF.textContent = inputCPF.value && !validarCPF(inputCPF.value) ? 'CPF inválido.' : '';
      });
      inputCPF.addEventListener('input', function () { erroCPF.textContent = ''; });
    }

    if (inputCEP) {
      inputCEP.addEventListener('blur', function () {
        if (!inputCEP.value) { erroCEP.textContent = ''; inputEndereco.value = ''; return; }
        buscarCEP(inputCEP.value)
          .then(function (d) {
            inputEndereco.value = d.logradouro + ', ' + d.bairro + ', ' + d.localidade + ' - ' + d.uf;
            erroCEP.textContent = '';
          })
          .catch(function () { erroCEP.textContent = 'CEP inválido ou não encontrado.'; inputEndereco.value = ''; });
      });
      inputCEP.addEventListener('input', function () { erroCEP.textContent = ''; });
    }

    if (inputSenha) {
      inputSenha.addEventListener('blur', function () {
        erroSenha.textContent = inputSenha.value && !validarSenha(inputSenha.value)
          ? 'Senha fraca. Mínimo 8 caracteres, 1 maiúscula e 1 especial.' : '';
      });
      inputSenha.addEventListener('input', function () { erroSenha.textContent = ''; });
    }

    if (inputConfirma) {
      inputConfirma.addEventListener('blur', function () {
        erroConfirma.textContent = inputConfirma.value && inputConfirma.value !== inputSenha.value
          ? 'As senhas não coincidem.' : '';
      });
      inputConfirma.addEventListener('input', function () { erroConfirma.textContent = ''; });
    }

    // ── Submit ──
    if (formulario) {
      formulario.onsubmit = function (e) {
        e.preventDefault();

        // Valida CPF
        if (inputCPF && !validarCPF(inputCPF.value)) {
          erroCPF.textContent = 'CPF inválido.'; return;
        }
        // Valida CEP
        if (inputCEP && inputCEP.value.replace(/\D/g,'').length !== 8) {
          erroCEP.textContent = 'CEP inválido.'; return;
        }
        // Valida senha
        if (inputSenha && !validarSenha(inputSenha.value)) {
          erroSenha.textContent = 'Senha fraca. Mínimo 8 caracteres, 1 maiúscula e 1 especial.'; return;
        }
        // Valida confirmação
        if (inputConfirma && inputConfirma.value !== inputSenha.value) {
          erroConfirma.textContent = 'As senhas não coincidem.'; return;
        }

        try {
          var nomeVal     = (document.getElementById('nome')    ? document.getElementById('nome').value    : '').trim();
          var usernameVal = (document.getElementById('usuario') ? document.getElementById('usuario').value : '').trim();
          var emailVal    = (document.getElementById('email')   ? document.getElementById('email').value   : '').trim().toLowerCase();
          var senhaVal    = inputSenha ? inputSenha.value : '';

          // ── Primeiro usuário cadastrado vira admin ──
          var existingUsers = [];
          try { existingUsers = JSON.parse(localStorage.getItem('nexa_users')) || []; } catch (err) {}
          var isPrimeiro = existingUsers.length === 0 && !localStorage.getItem('nexa_registered');
          var userRole   = isPrimeiro ? 'admin' : 'user';

          var userData = {
            name: nomeVal, username: usernameVal,
            email: emailVal, password: senhaVal,
            role: userRole, status: 'online'
          };

          // Salva em nexa_registered (compatibilidade legado)
          localStorage.setItem('nexa_registered', JSON.stringify(userData));

          // Salva na lista de usuários
          existingUsers.push(userData);
          localStorage.setItem('nexa_users', JSON.stringify(existingUsers));

          // Loga automaticamente após cadastro
          localStorage.setItem('nexa_logged_in', JSON.stringify({
            username: usernameVal, name: nomeVal, email: emailVal, role: userRole
          }));

          if (msgSucesso) {
            msgSucesso.style.display = 'block';
            msgSucesso.textContent = isPrimeiro
              ? 'Bem-vindo, Administrador! Redirecionando ao painel...'
              : 'Cadastro realizado! Redirecionando...';
          }

          // Admin vai ao painel; estudante vai à página inicial
          setTimeout(function () {
            window.location.href = userRole === 'admin' ? '../admin.html' : '../pagina_inicial.html';
          }, 900);

        } catch (err) {
          console.error('Erro ao salvar cadastro:', err);
        }

        var btn = formulario.querySelector('button[type="submit"]');
        if (btn) {
          btn.disabled = true;
          setTimeout(function () { btn.disabled = false; }, 3000);
        }
      };
    }

  })();
  </script>
</body>
</html>
